 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Professional PDF Creator - Create high quality PDFs on your phone">
    
    <title>PDF Creator Pro</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- HEIC Support -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
</head>
<body>
    <!-- App Shell -->
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">PDF Creator Pro</h1>
                <button class="icon-button" id="menuButton" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Drop Zone -->
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-content">
                    <svg class="upload-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <h2>Tap to add files</h2>
                    <p>Images, PDFs, Office docs, or screenshots</p>
                    <button class="btn btn-primary" id="addFilesBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                        Add Files
                    </button>
                </div>
            </div>

            <!-- File List -->
            <div class="file-list" id="fileList" style="display: none;">
                <div class="file-list-header">
                    <h3>Files (<span id="fileCount">0</span>)</h3>
                    <button class="btn btn-text" id="clearAllBtn">Clear All</button>
                </div>
                <div class="file-items" id="fileItems"></div>
            </div>

            <!-- Settings -->
            <div class="settings-section" id="settings" style="display: none;">
                <!-- Page Size -->
                <div class="setting-group">
                    <label class="setting-label">Page Size</label>
                    <div class="chip-group" id="pageSizeGroup">
                        <button class="chip active" data-value="original">Original</button>
                        <button class="chip" data-value="a4">A4</button>
                        <button class="chip" data-value="letter">Letter</button>
                    </div>
                </div>

                <!-- Quality -->
                <div class="setting-group">
                    <label class="setting-label">Quality</label>
                    <div class="chip-group" id="qualityGroup">
                        <button class="chip active" data-value="maximum">Maximum</button>
                        <button class="chip" data-value="high">High</button>
                        <button class="chip" data-value="standard">Standard</button>
                    </div>
                </div>

                <!-- Orientation -->
                <div class="setting-group">
                    <label class="setting-label">Orientation</label>
                    <div class="chip-group" id="orientationGroup">
                        <button class="chip active" data-value="auto">Auto</button>
                        <button class="chip" data-value="portrait">Portrait</button>
                        <button class="chip" data-value="landscape">Landscape</button>
                    </div>
                </div>

                <!-- Margin -->
                <div class="setting-group">
                    <label class="setting-label">Margin</label>
                    <input type="range" id="marginSlider" min="0" max="72" value="36" step="1">
                    <div class="range-value">
                        <span id="marginValue">36pt</span>
                    </div>
                </div>

                <!-- Advanced Options -->
                <details class="advanced-options">
                    <summary>Advanced Options</summary>
                    <div class="advanced-content">
                        <div class="toggle-row">
                            <span>Add page numbers</span>
                            <label class="toggle">
                                <input type="checkbox" id="pageNumbers">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="toggle-row">
                            <span>Compress images</span>
                            <label class="toggle">
                                <input type="checkbox" id="compressImages">
                                <span class="toggle-slider"></span>
                            </label>
                        </div>
                        <div class="input-group">
                            <label for="watermark">Watermark text</label>
                            <input type="text" id="watermark" placeholder="Optional watermark" class="text-input">
                        </div>
                        <div class="input-group">
                            <label for="docTitle">Document title</label>
                            <input type="text" id="docTitle" placeholder="My Document" class="text-input">
                        </div>
                    </div>
                </details>
            </div>

            <!-- Create Button -->
            <div class="create-section" id="createSection" style="display: none;">
                <button class="btn btn-large btn-primary" id="createPdfBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM8 13h8v2H8v-2zm0 4h8v2H8v-2zm0-8h3v2H8V9z"/>
                    </svg>
                    Create PDF
                </button>
                <p class="helper-text">Your PDF will be saved to your device</p>
            </div>

            <!-- Progress -->
            <div class="progress-overlay" id="progressOverlay" style="display: none;">
                <div class="progress-card">
                    <div class="progress-spinner"></div>
                    <h3 id="progressTitle">Creating PDF...</h3>
                    <p id="progressMessage">Processing files</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <button class="btn btn-text" id="cancelBtn">Cancel</button>
                </div>
            </div>

            <!-- Result -->
            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-card">
                    <div class="success-icon">✓</div>
                    <h3>PDF Created!</h3>
                    <p id="resultMessage"></p>
                    <div class="result-actions">
                        <button class="btn btn-primary" id="downloadBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                            </svg>
                            Save PDF
                        </button>
                        <button class="btn btn-secondary" id="shareBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
                            </svg>
                            Share
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="files">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/>
                </svg>
                <span>Files</span>
            </button>
            <button class="nav-item" data-tab="settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                <span>Settings</span>
            </button>
            <button class="nav-item" data-tab="history">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                </svg>
                <span>History</span>
            </button>
        </nav>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.rtf,.svg,.heic,.heif" multiple hidden>
    
    <!-- Capture input for camera -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

    <!-- Scripts -->
    <script src="js/file-handler.js"></script>
    <script src="js/image-processor.js"></script>
    <script src="js/pdf-engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
